[custom]
; ===================== 基础规则 =====================
ruleset=DIRECT,https://clashrules.chenzisu.workers.dev/LocalAreaNetwork.list
ruleset=DIRECT,https://clashrules.chenzisu.workers.dev/UnBan.list

; ===================== 广告过滤 =====================
ruleset=🛑 Advertising,https://clashrules.chenzisu.workers.dev/BanAD.list
ruleset=🛑 Advertising,https://clashrules.chenzisu.workers.dev/BanProgramAD.list
ruleset=🛑 Advertising,https://clashrules.chenzisu.workers.dev/BanEasyList.list
ruleset=🛑 Advertising,https://clashrules.chenzisu.workers.dev/BanEasyListChina.list
ruleset=🍃 BanProgramAD,https://clashrules.chenzisu.workers.dev/BanProgramAD.list

; ===================== 国内增强 =====================
ruleset=DIRECT,https://rules.chenzisu.com/ChinaMedia.list

; ===================== AI 工具(独立分流)=====================
ruleset=💬 Intelligence,https://clashrules.chenzisu.workers.dev/AI.list
ruleset=💬 Intelligence,https://clashrules.chenzisu.workers.dev/AppleIntelligence.list
ruleset=💬 Intelligence,https://clashrules.chenzisu.workers.dev/GoogleOneVPN.list
ruleset=💬 Intelligence,https://clashrules.chenzisu.workers.dev/GoogleFCM.list
ruleset=💬 Intelligence,https://clashrules.chenzisu.workers.dev/Google.list

; ===================== 大陆网站 =====================
ruleset=DIRECT,https://clashrules.chenzisu.workers.dev/ChinaDomain.list
ruleset=DIRECT,https://clashrules.chenzisu.workers.dev/ChinaCompanyIp.list

; ===================== GFW 增强 =====================
ruleset=🚀 Global,https://clashrules.chenzisu.workers.dev/ProxyGFWlist.list

; ===================== 地区规则 =====================
ruleset=DIRECT,[]GEOIP,CN

; ===================== final =====================
ruleset=🐟 Final,[]FINAL


; ============================================================
;                    代理策略分组
; ============================================================

; 主策略（你常用）
custom_proxy_group=📲 GoogleVPN`url-test`(GoogleVPN|PixelVPN)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🚀 Global`select`[]DIRECT`[]📲 GoogleVPN
custom_proxy_group=💬 Intelligence`fallback`[]📲 GoogleVPN`[]🖐️ Manual_Intelligence`http://www.gstatic.com/generate_204`300
custom_proxy_group=🖐️ Manual_Intelligence`select`[]🇺🇲 Auto-US`[]🇯🇵 Auto-JP`[]🇸🇬 Auto-SG`[]🇨🇳 Auto-TW``[]DIRECT

; ============================================================
;                 服务分流策略
; ============================================================
custom_proxy_group=🛑 Advertising`select`[]REJECT`[]DIRECT
custom_proxy_group=🍃 BanProgramAD`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 Final`select`[]🚀 Global`[]DIRECT

; ============================================================
;                 Auto Region Pools (url-test)
; ============================================================
custom_proxy_group=🇺🇲 Auto-US`url-test`^(?!.*(Game|游戏|IPLC)).*(美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States).*`http://www.gstatic.com/generate_204`300,,150
custom_proxy_group=🇨🇳 Auto-TW`url-test`^(?!.*(Game|游戏|IPLC)).*(台|新北|彰化|TW|Taiwan).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 Auto-JP`url-test`^(?!.*(Game|游戏|IPLC)).*(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 Auto-SG`url-test`^(?!.*(Game|游戏|IPLC)).*(新加坡|坡|狮城|SG|Singapore).*`http://www.gstatic.com/generate_204`300,,50

; ============================================================
;                 Rule Generator 配置
; ============================================================
enable_rule_generator=true
overwrite_original_rules=false
clash_rule_base=https://clashrules.chenzisu.workers.dev/GeneralClashConfig.yml
