; ============================================================
;                    代理策略分组
; ============================================================

; 主策略（你常用）
custom_proxy_group=🚀 Global`fallback`[]📲 GoogleVPN`[]🖐️ Manual_Global`http://www.gstatic.com/generate_204`60,,50
custom_proxy_group=🖐️ Manual_Global`select`[]🇭🇰 Auto-HK`[]🇨🇳 Auto-TW`[]🇺🇲 Auto-US`[]🇯🇵 Auto-JP`[]🇸🇬 Auto-SG`[]DIRECT
custom_proxy_group=💬 Intelligence`fallback`[]📲 GoogleVPN`[]🖐️ Manual_Intelligence`http://www.gstatic.com/generate_204`60,,50
custom_proxy_group=🖐️ Manual_Intelligence`select`[]🇺🇲 Auto-US`[]🇸🇬 Auto-SG`^(?!.*(Game|游戏|IPLC)).*(美国|US|United States|新加坡|SG|Singapore).*`

; ============================================================
;                 服务分流策略
; ============================================================
custom_proxy_group=🍎 Apple`select`[]💬 Intelligence`[]DIRECT
custom_proxy_group=🌍 Google`select`[]💬 Intelligence`[]🚀 Global
custom_proxy_group=💬 Gemini`select`[]💬 Intelligence`[]🌍 Google
custom_proxy_group=💬 ChatGPT`select`[]💬 Intelligence
custom_proxy_group=💬 Claude`select`[]💬 Intelligence
custom_proxy_group=💬 AppleIntelligence`select`[]💬 Intelligence

custom_proxy_group=🎮 Game`select`(Game|游戏|IPLC)`[]🚀 Global`[]DIRECT

custom_proxy_group=💰 PayPal`select`[]🇺🇲 Auto-US`[]📲 GoogleVPN`[]DIRECT
custom_proxy_group=🛍️ Amazon`select`[]🇺🇲 Auto-US`[]🇯🇵 Auto-JP`[]🚀 Global`[]DIRECT

custom_proxy_group=⭐ Github`select`[]🚀 Global

custom_proxy_group=📲 Telegram`select`[]🚀 Global
custom_proxy_group=📲 Instagram`select`[]🚀 Global
custom_proxy_group=📲 Whatsapp`select`[]🚀 Global
custom_proxy_group=📲 LinkedIn`select`[]🚀 Global
custom_proxy_group=📲 Reddit`select`[]🚀 Global

custom_proxy_group=📺 YouTube`select`[]📺 YouTube-Smart`[]🚀 Global
custom_proxy_group=📺 Netflix`select`[]📺 Netflix-Smart`[]🚀 Global
custom_proxy_group=📺 DisneyPlus`select`[]📺 DisneyPlus-Smart`[]🚀 Global
custom_proxy_group=📺 AppleTV`select`[]🚀 Global
custom_proxy_group=📺 AppleFitness`select`[]📺 AppleTV`[]DIRECT
custom_proxy_group=📺 Mikanani`select`[]🚀 Global

custom_proxy_group=🎯 Mainland`select`[]DIRECT`[]🚀 Global
custom_proxy_group=🛑 Advertising`select`[]REJECT`[]DIRECT
custom_proxy_group=🍃 BanProgramAD`select`[]REJECT`[]DIRECT

custom_proxy_group=🐟 Final`select`[]🚀 Global`[]DIRECT


; ============================================================
;                 Auto Region Pools (url-test)
; ============================================================
custom_proxy_group=AutoTest`select`[]DIRECT
custom_proxy_group=🇭🇰 Auto-HK`url-test`^(?!.*(Game|游戏|IPLC)).*(港|HK|hk|Hong Kong|HongKong|hongkong).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇲 Auto-US`url-test`^(?!.*(Game|游戏|IPLC)).*(美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States).*`http://www.gstatic.com/generate_204`300,,150
custom_proxy_group=🇨🇳 Auto-TW`url-test`^(?!.*(Game|游戏|IPLC)).*(台|新北|彰化|TW|Taiwan).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 Auto-JP`url-test`^(?!.*(Game|游戏|IPLC)).*(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 Auto-SG`url-test`^(?!.*(Game|游戏|IPLC)).*(新加坡|坡|狮城|SG|Singapore).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=📲 GoogleVPN`url-test`(GoogleVPN|PixelVPN)`http://www.gstatic.com/generate_204`300,,50

; ===================== 流媒体解锁测试(使用实际端点)=====================
custom_proxy_group=📺 YouTube-Smart`url-test`^(?!.*(Game|游戏|IPLC)).*(港|HK|Hong Kong).*`https://www.youtube.com/premium`300,,50
custom_proxy_group=📺 Netflix-Smart`url-test`^(?!.*(Game|游戏|IPLC)).*(港|HK|Hong Kong).*`https://www.netflix.com/title/70143836`300,,50
custom_proxy_group=📺 DisneyPlus-Smart`url-test`^(?!.*(Game|游戏|IPLC)).*(台|TW|Taiwan).*`https://www.disneyplus.com/`300,,50

